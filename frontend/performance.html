<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Performance | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Performance</h1><p>Create and update employee reviews.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Reviews support ratings from 1 to 5.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content grid"><form class="panel" id="performanceForm"><div class="panel-header"><div><h2 id="reviewFormTitle">Create Review</h2><p>Record structured performance feedback.</p></div></div><input type="hidden" name="id"><div class="form-grid"><div class="field"><label>Employee</label><select name="employee_id" id="reviewEmployeeSelect" required><option value="">Loading employees...</option></select></div><div class="field"><label>Review Period</label><input name="review_period" placeholder="Q2 2026" required></div><div class="field"><label>Rating</label><input type="number" name="rating" min="1" max="5" value="3"></div><div class="field"><label>Status</label><select name="status"><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="approved">Approved</option></select></div><div class="field full"><label>Feedback</label><textarea name="feedback" required></textarea></div><div class="field full"><label>Goals</label><textarea name="goals"></textarea></div></div><div class="actions" style="margin-top:14px"><button class="btn btn-primary">Save Review</button><button type="button" class="btn btn-secondary" id="resetReviewBtn">Reset</button></div></form><div class="panel"><div class="panel-header"><div><h2>Performance Reviews</h2><p>Team review history.</p></div></div><div class="table-wrap"><table><thead><tr><th>Employee ID</th><th>Employee</th><th>Reviewer</th><th>Period</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead><tbody id="performanceRows"></tbody></table></div></div></section></main></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/performance.js?v=20260606-2"></script></body></html>
