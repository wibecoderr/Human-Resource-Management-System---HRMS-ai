<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Leave | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Leave</h1><p>Apply for leave and approve team requests.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Pending leaves appear in approval table.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content grid"><form class="panel" id="leaveForm"><div class="panel-header"><div><h2>Apply Leave</h2><p>Submit a leave request.</p></div></div><div class="form-grid"><div class="field"><label>Type</label><select name="leave_type"><option value="sick">Sick</option><option value="casual">Casual</option><option value="earned">Earned</option></select></div><div class="field"><label>Start Date</label><input type="date" name="start_date" required></div><div class="field"><label>End Date</label><input type="date" name="end_date" required></div><div class="field full"><label>Reason</label><textarea name="reason" required></textarea></div></div><button class="btn btn-primary" style="margin-top:14px">Apply</button></form><div class="panel"><div class="panel-header"><div><h2>Leave History</h2><p>Requests and approvals.</p></div></div><div class="table-wrap"><table><thead><tr><th>Type</th><th>Start</th><th>End</th><th>Reason</th><th>Status</th><th data-role="admin,senior_manager">Actions</th></tr></thead><tbody id="leaveRows"></tbody></table></div></div></section></main></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/leave.js?v=20260606-2"></script></body></html>
