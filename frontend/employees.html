<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Employees | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Employees</h1><p>Manage people, roles, and employment status.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Employee records sync with backend APIs.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content"><div class="panel"><div class="toolbar"><input class="search" id="employeeSearch" placeholder="Search employees"><button class="btn btn-primary" id="addEmployeeBtn" data-role="admin">Add Employee</button></div><div class="table-wrap"><table><thead><tr><th>Employee ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody id="employeeRows"></tbody></table></div><div class="toolbar"><span class="muted" id="employeeCount"></span><div class="actions"><button class="btn btn-secondary" id="prevPage">Prev</button><span id="pageInfo"></span><button class="btn btn-secondary" id="nextPage">Next</button></div></div></div></section></main></div>
<div class="modal-backdrop" id="employeeModal"><form class="modal" id="employeeForm"><div class="modal-header"><h2 id="employeeModalTitle">Add Employee</h2><button type="button" class="btn btn-icon" data-close-modal="employeeModal">x</button></div><div class="modal-body"><input type="hidden" name="id"><div class="form-grid"><div class="field"><label>Name</label><input name="name" required></div><div class="field"><label>Email</label><input name="email" type="email"></div><div class="field"><label>Password</label><input name="password" type="password"></div><div class="field"><label>Phone</label><input name="phone_no" required></div><div class="field"><label>Role</label><select name="role"><option value="employee">Employee</option><option value="hr_recruiter">HR Recruiter</option><option value="senior_manager">Senior Manager</option><option value="admin">Admin</option></select></div><div class="field"><label>Status</label><select name="status"><option value="active">Active</option><option value="inactive">Inactive</option></select></div></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-close-modal="employeeModal">Cancel</button><button class="btn btn-primary">Save</button></div></form></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/employees.js?v=20260607-3"></script></body></html>
