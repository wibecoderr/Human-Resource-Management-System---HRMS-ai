<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Payroll | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Payroll</h1><p>Manage compensation records.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Payroll data is protected by role.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content grid"><form class="panel" id="payrollForm" data-role="admin"><div class="panel-header"><div><h2>Create Payroll</h2><p>Add salary by employee and period.</p></div></div><div class="form-grid"><div class="field"><label>Employee ID</label><input name="employee_id" required></div><div class="field"><label>Month</label><input type="number" name="month" min="1" max="12" required></div><div class="field"><label>Year</label><input type="number" name="year" min="2020" required></div><div class="field"><label>Basic Salary</label><input type="number" name="basic_salary" min="1" step="0.01" required></div></div><button class="btn btn-primary" style="margin-top:14px">Save Payroll</button></form><div class="panel"><div class="panel-header"><div><h2>Payroll Records</h2><p>Employee payroll details.</p></div></div><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Employee ID</th><th>Month</th><th>Year</th><th>Basic Salary</th><th data-role="admin">Actions</th></tr></thead><tbody id="payrollRows"></tbody></table></div></div></section></main></div>
<div class="modal-backdrop" id="payrollModal"><form class="modal" id="payrollUpdateForm"><div class="modal-header"><h2>Edit Salary</h2><button type="button" class="btn btn-icon" data-close-modal="payrollModal">x</button></div><div class="modal-body"><input type="hidden" name="id"><div class="field"><label>Basic Salary</label><input type="number" name="basic_salary" min="1" step="0.01" required></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-close-modal="payrollModal">Cancel</button><button class="btn btn-primary">Save</button></div></form></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/payroll.js?v=20260606-2"></script></body></html>
