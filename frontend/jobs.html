<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Jobs | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Jobs</h1><p>Create and manage openings.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Open roles feed candidate applications.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content"><div class="panel"><div class="toolbar"><input class="search" id="jobSearch" placeholder="Search jobs"><button class="btn btn-primary" id="addJobBtn">Create Job</button></div><div class="table-wrap"><table><thead><tr><th>Title</th><th>Department</th><th>Location</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody id="jobRows"></tbody></table></div></div></section></main></div>
<div class="modal-backdrop" id="jobModal"><form class="modal" id="jobForm"><div class="modal-header"><h2 id="jobModalTitle">Create Job</h2><button type="button" class="btn btn-icon" data-close-modal="jobModal">x</button></div><div class="modal-body"><input type="hidden" name="id"><div class="form-grid"><div class="field"><label>Title</label><input name="title" required></div><div class="field"><label>Department</label><input name="department" required></div><div class="field"><label>Location</label><input name="location" required></div><div class="field"><label>Status</label><select name="status"><option value="open">Open</option><option value="closed">Closed</option></select></div><div class="field full"><label>Required Skills</label><textarea name="required_skills" placeholder="Go, Gin, PostgreSQL, JWT, REST"></textarea></div><div class="field full"><label>Description</label><textarea name="description" required></textarea></div></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-close-modal="jobModal">Cancel</button><button class="btn btn-primary">Save</button></div></form></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/jobs.js?v=20260607-2"></script></body></html>
