<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-body">
  <section class="auth-hero">
    <h1>HRMS</h1>
    <p>Run employees, hiring, attendance, leave, payroll, and performance from one focused workspace.</p>
  </section>
  <main class="auth-panel">
    <form class="login-card" id="loginForm">
      <div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div>
      <h2>Sign in</h2>
      <p class="muted">Use your company account to continue.</p>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field" style="margin-top:14px">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;margin-top:22px">Sign in</button>
      <p class="error hide" id="loginError"></p>
    </form>
  </main>
  <script src="js/api.js?v=20260607-1"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.currentTarget.querySelector("button");
      const error = document.getElementById("loginError");
      button.disabled = true;
      error.classList.add("hide");
      try {
        const auth = await Api.post("/api/auth/login", formData(event.currentTarget));
        Auth.save(auth);
        window.location.href = "dashboard.html";
      } catch (err) {
        error.textContent = err.message;
        error.classList.remove("hide");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
