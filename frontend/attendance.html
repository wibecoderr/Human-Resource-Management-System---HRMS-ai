<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Attendance | HRMS</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head><body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">H</span><span>HRMS</span></div><nav class="nav-list" id="navList"></nav></aside><main class="main"><header class="topbar"><button class="btn btn-icon mobile-only" id="menuBtn"></button><div class="page-title"><h1>Attendance</h1><p>Check in, check out, and review attendance history.</p></div><div class="top-actions"><button class="btn btn-icon" id="notificationBtn"></button><div class="user-chip"><span class="avatar" id="userAvatar">U</span><span class="user-meta"><strong id="userName">User</strong><br><small id="userRole">Role</small></span></div><button class="btn btn-icon" id="logoutBtn"></button></div><div class="notification-menu" id="notificationMenu"><div class="notification-item unread">Attendance actions use your current account.</div><button class="btn btn-ghost" id="markReadBtn" style="width:100%">Mark as read</button></div></header>
<section class="content grid"><div class="grid grid-2"><div class="panel"><div class="panel-header"><div><h2>Today</h2><p>Record your workday.</p></div></div><div class="actions"><button class="btn btn-success" id="checkInBtn">Check In</button><button class="btn btn-primary" id="checkOutBtn">Check Out</button></div></div><form class="panel" id="attendanceLookup" data-role="admin,senior_manager,hr_recruiter"><div class="panel-header"><div><h2>Employee Lookup</h2><p>Fetch attendance by employee ID.</p></div></div><div class="field"><label>Employee ID</label><input name="employee_id" required></div><button class="btn btn-secondary" style="margin-top:12px">Load</button></form></div><div class="panel"><div class="panel-header"><div><h2>Attendance History</h2><p id="attendanceScope">My records</p></div></div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>Employee ID</th></tr></thead><tbody id="attendanceRows"></tbody></table></div></div></section></main></div>
<script src="js/api.js?v=20260607-1"></script><script src="js/auth.js"></script><script src="js/attendance.js"></script></body></html>
